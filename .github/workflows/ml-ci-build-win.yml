name: "ML-CI-Win"
on:
  push:
    tags:
    - v*.*.*
  pull_request:
    branches:
    - main
  schedule:
    - cron: "0 10 * * *"  # Run at 2am PST (10am UTC) every day to refresh the cache.
  workflow_dispatch:  # Manual trigger
    inputs:
      REFRESH_CACHE:
        description: 'Refresh cache to remove unused files'
        type: boolean
        default: true

defaults:
  run:
    shell: powershell

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  presubmit:
    name: "Presubmit-Win"
    runs-on: windows-x86-n2-16
    permissions:
      id-token: write     # Required to get the OIDC token for WIF
      actions: write  # For gh cache delete.
      contents: write  # For gh release upload.
    env:
      MODEL_KEY: gemma-4-E2B-it.litertlm
      MODEL_PATH: ./models/gemma4
      MODEL_URL: gs://litert-lm-cicd/models/gemma4/gemma-4-E2B-it.litertlm

      # Clear ANDROID_NDK_HOME as Windows_x64 has NDK where jobs don't have permission for
      # androidndk rules to create symlinks.
      ANDROID_NDK_HOME:
      GH_TOKEN: ${{ github.token }}  # For gh release upload.
      REFRESH_CACHE: ${{ github.event_name == 'schedule' ||
                         (github.event_name == 'workflow_dispatch' && inputs.REFRESH_CACHE) }}
    steps:
      - name: Install System Dependencies
        run: |
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          Set-ExecutionPolicy Bypass -Scope Process -Force
          Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))

          # Temporarily add choco to this step's path so the installer below functions
          $env:Path += ";$env:ALLUSERSPROFILE\chocolatey\bin"

          $env:JAVA_HOME = [System.Environment]::GetEnvironmentVariable("JAVA_HOME", "Machine")

          choco install git make pkgconfiglite openjdk17 ccache bazelisk gcloudsdk 7zip --no-progress -y

          python -m pip install --break-system-packages numpy pytest==8.3.4

      - name: Configure System Paths
        run: |
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\Git\cmd"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\Git\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\Git\mingw64\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "$env:ALLUSERSPROFILE\chocolatey\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.cargo\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\7-Zip"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\Google\Cloud SDK\google-cloud-sdk\bin"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Test GCloud Storage
        run: |
          gcloud storage ls gs://litert-lm-cicd/caches/windows/bazel

      - name: Install Rust
        run: |
          Invoke-WebRequest -Uri "https://win.rustup.rs" -OutFile "rustup-init.exe"
          .\rustup-init.exe -y --default-host x86_64-pc-windows-msvc

      - name: Patch MSVC Linker for Long Paths
        run: |
          $linkPath = (Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Tools\MSVC\*\bin\HostX64\x64\link.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $linkPath) { throw "Could not locate MSVC link.exe" }

          $manifestContent = @"
          <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <assembly xmlns="urn:schemas-microsoft-com:asm.v1" manifestVersion="1.0">
            <application xmlns="urn:schemas-microsoft-com:asm.v3">
              <windowsSettings>
                <longPathAware xmlns="http://schemas.microsoft.com/SMI/2016/WindowsSettings">true</longPathAware>
              </windowsSettings>
            </application>
          </assembly>
          "@
          $manifestPath = "C:\TMP\longpath.manifest"
          if (-not (Test-Path "C:\TMP")) { New-Item -ItemType Directory -Path "C:\TMP" -Force | Out-Null }
          Set-Content -Path $manifestPath -Value $manifestContent -Encoding UTF8

          $mtExe = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\mt.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $mtExe) { throw "Could not locate Windows SDK mt.exe" }

          Write-Host "Injecting LongPath manifest into $linkPath using $mtExe"
          & $mtExe -nologo -manifest $manifestPath -outputresource:"$linkPath`;1"

          if ($LASTEXITCODE -ne 0) { throw "mt.exe failed to patch the linker." }

      - name: Redirect Temp Directories to Workspace Drive
        run: |
          # Redirect Temp files straight to the big mounted drive
          $newTemp = "C:\_w\_tmp"
          if (-not (Test-Path $newTemp)) {
              New-Item -ItemType Directory -Path $newTemp -Force | Out-Null
          }

          echo "TMP=$newTemp" >> $env:GITHUB_ENV
          echo "TEMP=$newTemp" >> $env:GITHUB_ENV

          Write-Host "Re-mapped TMP and TEMP to $newTemp"

      - name: Set up cache keys and bazel output base
        id: cache-keys
        run: |
          # Create a dedicated directory on the big drive for the B: mount
          $bigDrivePath = "C:\_w\_b"
          if (-not (Test-Path $bigDrivePath)) {
              New-Item -ItemType Directory -Path $bigDrivePath -Force | Out-Null
          }

          subst B: $bigDrivePath

          $BAZEL_OUTPUT_BASE = "B:\job"

          $CACHE_RESTORE_KEY_2="${{ github.workflow }}"
          $CACHE_RESTORE_KEY_1="$CACHE_RESTORE_KEY_2-${{ hashFiles('**/WORKSPACE', '**/.bazelrc') }}"
          $CACHE_RESTORE_KEY_0="$CACHE_RESTORE_KEY_1-${{ hashFiles('**/BUILD*') }}"
          $CACHE_RESTORE_KEY_HEAD="$CACHE_RESTORE_KEY_0-${{ github.event.pull_request.base.sha }}"
          $CACHE_KEY="$CACHE_RESTORE_KEY_0-${{ github.sha }}"

          echo "CACHE_RESTORE_KEY_2=$CACHE_RESTORE_KEY_2" >> $env:GITHUB_OUTPUT
          echo "CACHE_RESTORE_KEY_1=$CACHE_RESTORE_KEY_1" >> $env:GITHUB_OUTPUT
          echo "CACHE_RESTORE_KEY_0=$CACHE_RESTORE_KEY_0" >> $env:GITHUB_OUTPUT
          echo "CACHE_RESTORE_KEY_HEAD=$CACHE_RESTORE_KEY_HEAD" >> $env:GITHUB_OUTPUT
          echo "CACHE_KEY=$CACHE_KEY" >> $env:GITHUB_OUTPUT

          $SHORT_SHA=$("${{ github.sha }}".SubString(0, 8))
          echo "BAZEL_OUTPUT_BASE=${BAZEL_OUTPUT_BASE}-$SHORT_SHA" >> $env:GITHUB_ENV

      - name: Clean build outputs if cache is being refreshed
        if: env.REFRESH_CACHE == 'true'
        run: bazel --output_base="$env:BAZEL_OUTPUT_BASE" clean --expunge


      - name: Restore bazel cache if cache is not being refreshed.
        id: bazel-cache
        if: env.REFRESH_CACHE != 'true'
        run: |
          $TARGET_DIR = "$HOME/.cache/bazel"
          $BUCKET_URL = "gs://litert-lm-cicd/caches/windows/bazel"

          Add-Content -Path $env:GITHUB_OUTPUT -Value "cache-primary-key=${{ steps.cache-keys.outputs.CACHE_KEY }}"

          $CACHE_KEYS = @(
              "${{ steps.cache-keys.outputs.CACHE_KEY }}",
              "${{ steps.cache-keys.outputs.CACHE_RESTORE_KEY_HEAD }}",
              "${{ steps.cache-keys.outputs.CACHE_RESTORE_KEY_0 }}",
              "${{ steps.cache-keys.outputs.CACHE_RESTORE_KEY_1 }}",
              "${{ steps.cache-keys.outputs.CACHE_RESTORE_KEY_2 }}"
          )

          $FOUND_BLOB = ""

          $GCLOUD_OUTPUT = gcloud storage ls $BUCKET_URL

          foreach ($key in $CACHE_KEYS) {
              $SEARCH_PATH = "$BUCKET_URL/$key"
              Write-Host "Checking for cache key prefix: $SEARCH_PATH"

              # $match will contain the actual full file paths from gcloud that contain the prefix
              $match = $GCLOUD_OUTPUT -match [regex]::Escape($SEARCH_PATH)

              if ($match) {
                  # Grab the first exact file match from the list
                  $FOUND_BLOB = $match[0]
                  Write-Host "Found matching cache file: $FOUND_BLOB"
                  break
              } else {
                  Write-Host "Key Miss: $SEARCH_PATH"
              }
          }

          if (-not [string]::IsNullOrEmpty($FOUND_BLOB)) {
            Write-Host "Cache hit! Found blob: $FOUND_BLOB"

            # Parse the clean key name out of the full GCS blob path for logging
            $MATCHED_KEY = (Split-Path $FOUND_BLOB -Leaf) -replace '\.tar\.gz$', ''
            Add-Content -Path $env:GITHUB_OUTPUT -Value "cache-hit=true"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "cache-matched-key=$MATCHED_KEY"

            Write-Host "Downloading cache archive..."
            # FOUND_BLOB now contains the full gs:// path, so use it directly
            gcloud storage cp $FOUND_BLOB ./cache.tar.gz

            if (Test-Path ./cache.tar.gz -PathType Leaf) {
              Write-Host "Extracting artifacts to $TARGET_DIR..."
              New-Item -ItemType Directory -Force -Path $TARGET_DIR | Out-Null
              tar -xzf ./cache.tar.gz -C $TARGET_DIR
              Remove-Item ./cache.tar.gz -Force -ErrorAction SilentlyContinue
            }
          } else {
            Write-Host "No matching cache found in GCS. Proceeding with clean build."
            Add-Content -Path $env:GITHUB_OUTPUT -Value "cache-hit=false"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "cache-matched-key="
          }

      - name: Check cache hit
        run: |
          echo "Cache Hit: ${{ steps.bazel-cache.outputs.cache-hit }}"
          echo "Cache Primary Key: ${{ steps.bazel-cache.outputs.cache-primary-key }}"
          echo "Cache Matched Key: ${{ steps.bazel-cache.outputs.cache-matched-key }}"

      - name: Download Model
        run: |
          $TARGET_DIR = "${{ env.MODEL_PATH }}"
          $BUCKET_URL = "${{ env.MODEL_URL }}"
          $MODEL_KEY = "${{ env.MODEL_KEY }}"

          if (-not (Test-Path $TARGET_DIR)) { 
            New-Item -ItemType Directory -Path $TARGET_DIR -Force | Out-Null 
          }

          gcloud storage cp "$BUCKET_URL" "$TARGET_DIR/$MODEL_KEY"

      - name: Run bazel build on Windows
        run: |
          bazel --output_base="$env:BAZEL_OUTPUT_BASE" `
            build --disk_cache=~/.cache/bazel `
            --repository_cache=~/.cache/bazel/repo `
            --deleted_packages=swift `
            --build_tag_filters='-nowindows' `
            --action_env=TMP="$env:TMP" `
            --action_env=TEMP="$env:TEMP" `
            -- `
            //runtime/engine:litert_lm_main `
            -//kotlin/...

      - name: Update litert_lm_main prebuilt for Windows if new version tag is pushed
        if: github.ref_type == 'tag'
        run: |
          cp bazel-bin/runtime/engine/litert_lm_main.exe litert_lm_main.windows_x86_64.exe
          gh release upload ${{ github.ref_name }} litert_lm_main.windows_x86_64.exe --clobber


      - name: Run bazel test on Windows
        continue-on-error: true
        run: |
          bazel --output_base="$env:BAZEL_OUTPUT_BASE" `
            test --disk_cache=~/.cache/bazel --test_output=errors `
            --repository_cache=~/.cache/bazel/repo `
            --deleted_packages=swift `
            --test_timeout=300,1500,5400,18000 `
            --test_tag_filters='-requires-mac-inputs:hard,-nowindows' `
            --action_env=TMP="$env:TMP" `
            --action_env=TEMP="$env:TEMP" `
            -- `
            //runtime/... `
            //schema/... `
            //c/...

      - name: Run pytest
        # Execute pytest via the python module (-m) to bypass missing pytest.exe PATH issues
        run: python -m pytest tools/pytest/ --backend=cpu --model-path=${{ env.MODEL_PATH }}/${{ env.MODEL_KEY }} --build-system=bazel

      - name: Upload bazel test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-test-logs-windows
          path: bazel-testlogs/**/test.log

      - name: Clean build outputs for dynamic linking build
        run: bazel --output_base="$env:BAZEL_OUTPUT_BASE" clean --expunge

      - name: Run bazel build on Windows with dynamic linking
        run: |
          bazel --output_base="$env:BAZEL_OUTPUT_BASE" `
            build --disk_cache=~/.cache/bazel `
            --repository_cache=~/.cache/bazel/repo `
            --define=litert_link_capi_so=true `
            --define=litert_runtime_link_mode=dynamic `
            --define=resolve_symbols_in_exec=false `
            //runtime/engine:litert_lm_main

      - name: Run pytest for dynamic linking
        # Execute pytest via the python module (-m) to bypass missing pytest.exe PATH issues
        run: python -m pytest tools/pytest/ -v `
          --backend=cpu --dynamic --prebuilt `
          --model-path=${{ env.MODEL_PATH }}/${{ env.MODEL_KEY }} --build-system=bazel

      - name: Remove cache if cache is being refreshed
        if: env.REFRESH_CACHE == 'true'
        continue-on-error: true  # Keeps the build moving if the file wasn't there to begin with
        run: |
          $CacheKey = "${{ steps.cache-keys.outputs.CACHE_KEY }}"
          $BucketUrl = "gs://litert-lm-cicd/caches/windows/bazel"

          Write-Host "REFRESH_CACHE is true. Removing existing cache from GCS: $BucketUrl/$CacheKey.tar.gz"

          # Delete the specific tarball from the GCS bucket
          gcloud storage rm "$BucketUrl/$CacheKey.tar.gz"

      - name: Save bazel cache if it's new or being refreshed
        if: env.REFRESH_CACHE == 'true' || steps.bazel-cache.outputs.cache-hit != 'true'
        run: |
          $TargetDir = "$HOME/.cache/bazel"
          $CacheKey = "${{ steps.cache-keys.outputs.CACHE_KEY }}"
          $BucketUrl = "gs://litert-lm-cicd/caches/windows/bazel"
          $ArchiveName = "cache.tar.gz"

          Write-Host "Checking if target cache folder exists: $TargetDir"
          if (-not (Test-Path $TargetDir)) {
              Write-Host "Target cache folder not found. Skipping cache save."
              exit 0
          }

          Write-Host "Compressing cache artifacts from $TargetDir..."
          # Compress the contents of the bazel cache directory
          # -C changes to the directory, and the dot (.) grabs everything inside it
          tar -czf ./$ArchiveName -C $TargetDir .

          if (Test-Path "./$ArchiveName") {
              Write-Host "Uploading cache archive to $BucketUrl/$CacheKey.tar.gz..."
              gcloud storage cp ./$ArchiveName "$BucketUrl/$CacheKey.tar.gz"
          }
