<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiteRT-LM.js Chat</title>
  
  <!-- PWA Assets & Mobile Headers -->
  <link rel="manifest" href="./manifest.json" crossorigin="use-credentials">

  <meta name="theme-color" content="#0b0f19">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --bg-dark: #0b0f19;
      --bg-card: #151d30;
      --bg-chat: #0e1424;
      --bg-input: #070a12;
      --border: #24324f;
      --text: #f1f5f9;
      --text-muted: #64748b;
      --teal: #00c99e;
      --teal-dark: #0b705d;
      --blue: #3b82f6;
      --blue-dark: #1d4ed8;
      --slate-bubble-user: #1e293b;
      --slate-bubble-bot: #151e33;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      overscroll-behavior: none; 
    }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Centralized Lit Component App Shell -->
  <litert-lm-chat-app></litert-lm-chat-app>

  <!-- Mount the Lit Elements Entrypoint -->
  <script type="module" src="/src/index.ts"></script>
</body>
</html>
